<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crystal &amp; Jonathan — Find Your Table</title>
<style>
  :root {
    --bg: #faf7f2;
    --card: #ffffff;
    --ink: #2e2a26;
    --muted: #8a8178;
    --accent: #a87c5f;
    --accent-dark: #7c5a42;
    --found-bg: #f1f7ee;
    --found-border: #b9d8a6;
    --found-text: #3f6b2c;
    --error-bg: #fcefee;
    --error-border: #e3a8a4;
    --error-text: #a33f3a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    overflow-x: hidden;
  }
  body {
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--ink);
    padding: 20px 16px 32px;
  }
  .wrap { max-width: 440px; width: 100%; margin: 0 auto; }
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 26px 20px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.06);
    text-align: center;
  }
  .names {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 24px;
    color: var(--accent-dark);
    margin: 0 0 4px;
    letter-spacing: 0.5px;
  }
  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin: 0 0 22px;
  }

  @media (max-width: 360px) {
    body { padding: 14px 10px 24px; }
    .card { padding: 20px 14px; }
    .names { font-size: 21px; }
    .result-table { font-size: 36px; }
  }
  .search-row {
    display: flex;
    gap: 8px;
  }
  input[type="text"] {
    flex: 1;
    padding: 14px 16px;
    font-size: 16px;
    border: 1.5px solid #e6e0d8;
    border-radius: 10px;
    outline: none;
    background: #fffefc;
    color: var(--ink);
  }
  input[type="text"]:focus { border-color: var(--accent); }
  button {
    padding: 0 22px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }
  button:hover { background: var(--accent-dark); }
  button:disabled { background: #d8cfc4; cursor: default; }

  .result {
    margin-top: 22px;
    border-radius: 12px;
    padding: 22px 18px;
    display: none;
  }
  .result.found {
    background: var(--found-bg);
    border: 1px solid var(--found-border);
  }
  .result.notfound {
    background: var(--error-bg);
    border: 1px solid var(--error-border);
  }
  .result-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 0 0 6px;
    color: var(--found-text);
  }
  .result-table {
    font-size: 42px;
    font-weight: 700;
    line-height: 1;
    margin: 0 0 6px;
    color: var(--found-text);
  }
  .result-name {
    font-size: 14px;
    color: var(--found-text);
    margin: 0;
    white-space: pre-line;
  }
  .result-err {
    font-size: 14px;
    color: var(--error-text);
    margin: 0;
  }
  .status {
    margin-top: 18px;
    font-size: 13px;
    color: var(--muted);
  }
  .footer-note {
    margin-top: 22px;
    font-size: 12px;
    color: var(--muted);
  }
  .floorplan-wrap {
    margin-top: 18px;
    display: none;
  }
  .floorplan-label {
    font-size: 12px;
    color: var(--muted);
    margin: 0 0 8px;
  }
  .floorplan-wrap img {
    width: 100%;
    border-radius: 10px;
    border: 1px solid #e6e0d8;
    display: block;
  }
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid #e6e0d8;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <p class="names">Jonathan &amp; Crystal</p>
      <p class="subtitle">Type your name to find your table</p>

      <div class="search-row">
        <input type="text" id="nameInput" placeholder="Your name…" autocomplete="off" disabled />
        <button id="searchBtn" disabled>Find</button>
      </div>

      <div class="result" id="result">
        <p class="result-label" id="resultLabel"></p>
        <p class="result-table" id="resultTable"></p>
        <p class="result-name" id="resultName"></p>
        <p class="result-err" id="resultErr"></p>
      </div>

      <div class="floorplan-wrap" id="floorplanWrap">
        <p class="floorplan-label">Floor plan — your table is highlighted</p>
        <img id="floorplanImg" src="" alt="Reception floor plan with your table highlighted" />
      </div>

      <p class="status" id="status"><span class="spinner"></span>Loading guest list…</p>
    </div>
    <p class="footer-note">Can't find your name? Please ask a member of the bridal party for help.</p>
  </div>

<script>
// ====== CONFIGURE THIS ======
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrm8aiZKcsTnudFJBXmmCSIJQD0-KTaP5FhQUw3z-PGuUVds7rCsmWe1oDJWEpjNl_H-jevqdPo35s/pub?gid=903307830&single=true&output=csv";
// =============================

// Maps table number (as string) to a floor plan image filename.
// Tables 1-9 each get their own highlighted floor plan.
// Any other value (Bridal, Groom, etc.) returns null = no image shown.
function getFloorplanImage(tableValue) {
  const tableNum = tableValue.trim();
  const validTables = ['1','2','3','4','5','6','7','8','9'];
  if (validTables.includes(tableNum)) {
    return `floorplan${tableNum}.png`;
  }
  return null;
}

let guestData = [];

function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else { inQuotes = false; }
      } else { field += c; }
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\r') { /* skip */ }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else { field += c; }
    }
  }
  if (field.length > 0 || row.length > 0) { row.push(field); rows.push(row); }
  return rows.filter(r => r.some(cell => cell.trim() !== ''));
}

function findColumnIndex(header, candidates) {
  const lower = header.map(h => h.trim().toLowerCase());
  for (const c of candidates) {
    const idx = lower.indexOf(c);
    if (idx !== -1) return idx;
  }
  return -1;
}

async function loadGuestList() {
  const statusEl = document.getElementById('status');
  try {
    const res = await fetch(SHEET_CSV_URL, { cache: "no-store" });
    if (!res.ok) throw new Error("Network response was not ok");
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error("No data rows found");

    const header = rows[0];
    const nameIdx = findColumnIndex(header, ["guest name", "name"]);
    const tableIdx = findColumnIndex(header, ["table number", "table"]);

    if (nameIdx === -1 || tableIdx === -1) throw new Error("Could not find name/table columns");

    guestData = rows.slice(1).map(r => ({
      name: (r[nameIdx] || "").trim(),
      table: (r[tableIdx] || "").trim()
    })).filter(g => g.name !== "");

    statusEl.style.display = 'none';
    document.getElementById('nameInput').disabled = false;
    document.getElementById('searchBtn').disabled = false;
    document.getElementById('nameInput').focus();
  } catch (err) {
    statusEl.innerHTML = "⚠️ Couldn't load the guest list. Please check your connection and refresh, or ask a member of the bridal party for help.";
  }
}

function showFloorplan(imageFile) {
  const wrap = document.getElementById('floorplanWrap');
  const img = document.getElementById('floorplanImg');
  if (imageFile) {
    img.src = imageFile;
    wrap.style.display = 'block';
  } else {
    wrap.style.display = 'none';
    img.src = '';
  }
}

function findTable() {
  const input = document.getElementById('nameInput').value.trim().toLowerCase();
  const box = document.getElementById('result');
  const label = document.getElementById('resultLabel');
  const tableEl = document.getElementById('resultTable');
  const nameEl = document.getElementById('resultName');
  const errEl = document.getElementById('resultErr');

  box.style.display = 'block';
  tableEl.textContent = '';
  nameEl.textContent = '';
  errEl.textContent = '';
  showFloorplan(null);

  if (!input) {
    box.className = 'result notfound';
    label.textContent = '';
    errEl.textContent = 'Please type your name to search.';
    return;
  }

  const matches = guestData.filter(g => g.name.toLowerCase().includes(input));

  if (matches.length === 1) {
    box.className = 'result found';
    label.textContent = 'Your table';
    tableEl.textContent = matches[0].table;
    nameEl.textContent = matches[0].name;
    showFloorplan(getFloorplanImage(matches[0].table));

  } else if (matches.length > 1 && matches.length <= 6) {
    box.className = 'result found';
    label.textContent = 'Multiple matches';
    tableEl.textContent = '';
    nameEl.textContent = matches.map(m => `${m.name} → Table ${m.table}`).join('\n');
    // Show floor plan only if all matches are at the same numbered table
    const uniqueTables = [...new Set(matches.map(m => m.table.trim()))];
    if (uniqueTables.length === 1) {
      showFloorplan(getFloorplanImage(uniqueTables[0]));
    }

  } else if (matches.length > 6) {
    box.className = 'result notfound';
    label.textContent = '';
    errEl.textContent = 'Too many matches — please type more of your name (e.g. full name).';

  } else {
    box.className = 'result notfound';
    label.textContent = '';
    errEl.textContent = "Name not found — please check spelling, or ask a member of the bridal party for help.";
  }
}

document.getElementById('searchBtn').addEventListener('click', findTable);
document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') findTable();
});

loadGuestList();
</script>
</body>
</html>
